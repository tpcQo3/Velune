<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veluneink - Write</title>

  <link href="https://fonts.googleapis.com/css2?
family=Dancing+Script&
family=Great+Vibes&
family=Allura&
family=Parisienne&
family=Playfair+Display&
family=Merriweather&
family=Libre+Baskerville&
family=Cormorant+Garamond&
family=Quicksand&
family=Nunito&
family=Poppins&
family=Pacifico&
family=Indie+Flower&
family=Shadows+Into+Light&
family=Fredoka&
display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&family=Baloo+2:wght@400;600&display=swap" rel="stylesheet">

  <!-- link rel="stylesheet" href="style.css"-->
  <!-- BASE -->
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/layout.css">

<!-- COMPONENTS -->
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/editor.css">
<link rel="stylesheet" href="styles/popup.css">
<link rel="stylesheet" href="styles/effects.css">
<!-- THEMES -->
<link rel="stylesheet" href="styles/themes/aries.css">
<link rel="stylesheet" href="styles/themes/taurus.css">
<link rel="stylesheet" href="styles/themes/gemini.css">
<link rel="stylesheet" href="styles/themes/cancer.css">
<link rel="stylesheet" href="styles/themes/leo.css">
<link rel="stylesheet" href="styles/themes/virgo.css">
<link rel="stylesheet" href="styles/themes/libra.css">
<link rel="stylesheet" href="styles/themes/scorpio.css">
<link rel="stylesheet" href="styles/themes/sagittarius.css">
<link rel="stylesheet" href="styles/themes/capricorn.css">
<link rel="stylesheet" href="styles/themes/aquarius.css">
<link rel="stylesheet" href="styles/themes/pisces.css">

<!-- EXTRA THEMES -->
<link rel="stylesheet" href="styles/themes/sky.css">
<link rel="stylesheet" href="styles/themes/moon.css">
<link rel="stylesheet" href="styles/themes/romantic.css">
<link rel="stylesheet" href="styles/themes/hellokitty.css">
</head>

<body>

<div class="container fade-in">

  <h1 class="v1lt">Viết một lá thư</h1>
  <p class="subtitle">express your feelings</p>
  <button class="help-btn" onclick="goHelp()">❓</button>

  <div class="meta">
    <input id="from" type="text" placeholder="Người gửi">
    <input id="to" type="text" placeholder="Người nhận">
  </div>

  <div class="toolbar">
    <select id="font">
  <optgroup label="💌 Romantic">
    <option value="'Dancing Script', cursive">Dancing Script</option>
    <option value="'Great Vibes', cursive">Great Vibes</option>
    <option value="'Allura', cursive">Allura</option>
    <option value="'Parisienne', cursive">Parisienne</option>
  </optgroup>

  <optgroup label="📖 Classic">
    <option value="'Playfair Display', serif">Playfair</option>
    <option value="'Merriweather', serif">Merriweather</option>
    <option value="'Libre Baskerville', serif">Baskerville</option>
    <option value="'Cormorant Garamond', serif">Cormorant</option>
  </optgroup>

  <optgroup label="🌿 Modern">
    <option value="'Quicksand', sans-serif">Quicksand</option>
    <option value="'Nunito', sans-serif">Nunito</option>
    <option value="'Poppins', sans-serif">Poppins</option>
  </optgroup>

  <optgroup label="🎨 Style">
    <option value="'Pacifico', cursive">Pacifico</option>
    <option value="'Indie Flower', cursive">Indie Flower</option>
    <option value="'Shadows Into Light', cursive">Shadows</option>
    <option value="'Fredoka', sans-serif">Fredoka</option>
  </optgroup>
</select>
  </div>

    <div class="color-toolbar">
  <span>Màu chữ:</span>

  <div class="color-palette">
    <button style="background:#000000" onclick="setColor('#000000')"></button>
    <button style="background:#e53935" onclick="setColor('#e53935')"></button>
    <button style="background:#8e24aa" onclick="setColor('#8e24aa')"></button>
    <button style="background:#3949ab" onclick="setColor('#3949ab')"></button>
    <button style="background:#00897b" onclick="setColor('#00897b')"></button>
    <button style="background:#fdd835" onclick="setColor('#fdd835')"></button>
    <button style="background:#fb8c00" onclick="setColor('#fb8c00')"></button>
  </div>
</div>

  <div id="editor" class="editor" contenteditable="true"></div>

  <div class="settings">

    <select id="expiry">
      <option value="0">Không giới hạn</option>
      <option value="1">1 ngày</option>
      <option value="3">3 ngày</option>
      <option value="7">7 ngày</option>
      <option value="30">30 ngày</option>
    </select>

    <input id="password" type="password" placeholder="Password (optional)">

    <select id="theme">
  <option value="sky">🌞 Sky</option>
  <option value="moon">🌙 Moon</option>
  <option value="romantic">🌹 Romantic</option>
  <option value="hellokitty">🎀 Hello Kitty</option>
  <option value="aries">♈ Aries - Bạch Dương</option>
  <option value="taurus">♉ Taurus - Kim Ngưu</option>
  <option value="gemini">♊ Gemini - Song Tử</option>
  <option value="cancer">♋ Cancer - Cự Giải</option>
  <option value="leo">♌ Leo - Sư Tử</option>
  <option value="virgo">♍ Virgo - Xử Nữ</option>
  <option value="libra">♎ Libra - Thiên Bình</option>
  <option value="scorpio">♏ Scorpio - Bọ Cạp</option>
  <option value="sagittarius">♐ Sagittarius - Nhân Mã</option>
  <option value="capricorn">♑ Capricorn - Ma Kết</option>
  <option value="aquarius">♒ Aquarius - Bảo Bình</option>
  <option value="pisces">♓ Pisces - Song Ngư</option>
</select>

    <input id="youtube" type="text" placeholder="YouTube URL">
    <input id="ytStart" type="number" placeholder="Start (sec)">
    <input id="ytEnd" type="number" placeholder="End (sec)">
  </div>

  <div class="preview">
    <h3>Preview</h3>
    <div id="preview" class="letter-content"></div>
  </div>

  <button class="btn" onclick="createLetter()">Tạo thư</button>

  <p id="status"></p>

  <div id="popup" class="popup hidden">
  <div class="popup-box">
    <h3>🎉 Thành công!</h3>

    <p>Bạn đã tạo một lá thư ✨</p>

    <input id="popupLink" readonly>

    <!-- QR -->
    <canvas id="qrcode"></canvas>

    <div class="popup-actions">
      <button onclick="copyLink()">Copy link</button>
      <button onclick="closePopup()">Đóng</button>
    </div>
  </div>
</div>
<div class="stars-2"></div>
<div class="shooting-star"></div>
<div class="heat-layer"></div>
<div class="gemini-ghost"></div>
<div class="gemini-glitch"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="script.js"></script>

</body>
</html>
