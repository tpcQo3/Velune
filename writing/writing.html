<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veluneink - Write</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Quicksand:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container fade-in">

  <h1>Write a letter</h1>
  <p class="subtitle">everything starts from a feeling</p>

  <!-- FORM -->
  <div class="form">

    <input id="from" type="text" placeholder="Người gửi">

    <input id="to" type="text" placeholder="Người nhận">

    <textarea id="content" placeholder="Nội dung thư..."></textarea>

  </div>

  <!-- PREVIEW (render giống final output) -->
  <div class="preview">

    <h3>Preview</h3>

    <p><b>Từ:</b> <span id="p-from">...</span></p>
    <p><b>Gửi đến:</b> <span id="p-to">...</span></p>

    <div id="p-content" class="letter-content">
      Nội dung sẽ hiển thị ở đây...
    </div>

  </div>

  <!-- BUTTON -->
  <button class="btn" onclick="createLetter()">Tạo thư</button>

  <p id="status"></p>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">

    <h2>🎉 Chúc mừng bạn đã viết một lá thư!</h2>

    <p>Bấm vào link bên dưới để mở thư của bạn:</p>

    <a id="openLink" href="#" target="_blank">Mở thư</a>

    <input id="linkBox" readonly>

    <button onclick="copyLink()" class="btn-small">Copy link</button>
    <button onclick="closePopup()" class="btn-small secondary">Đóng</button>

  </div>
</div>

<script type="module" src="script.js">
</script>

</body>
</html>
