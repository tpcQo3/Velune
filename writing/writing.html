<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veluneink - Write</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400&family=Playfair+Display&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container fade-in">

  <h1>Write a Letter</h1>
  <p class="subtitle">express what you can’t say</p>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <select id="font">
      <option value="Quicksand">Default</option>
      <option value="serif">Serif</option>
      <option value="monospace">Mono</option>
      <option value="cursive">Cursive</option>
    </select>

    <select id="size">
      <option value="14px">Small</option>
      <option value="16px" selected>Normal</option>
      <option value="20px">Large</option>
      <option value="26px">Huge</option>
    </select>

    <input type="color" id="color">

    <button onclick="cmd('bold')"><b>B</b></button>
    <button onclick="cmd('italic')"><i>I</i></button>
    <button onclick="cmd('underline')"><u>U</u></button>
  </div>

  <!-- EDITOR -->
  <div id="editor" class="editor" contenteditable="true"></div>

  <!-- PREVIEW -->
  <div class="preview">
    <h3>Preview</h3>
    <div id="preview" class="letter-content"></div>
  </div>

  <button class="btn" onclick="createLetter()">Tạo thư</button>

  <p id="status"></p>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
