<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đọc thư 💌</title>

  <!-- 🔥 DÙNG CHUNG CSS -->
  <link rel="stylesheet" href="../writing/styles/base.css">
  <link rel="stylesheet" href="../writing/styles/layout.css">
  <link rel="stylesheet" href="../writing/styles/components.css">
  <link rel="stylesheet" href="../writing/styles/editor.css">
  <link rel="stylesheet" href="../writing/styles/effects.css">

  <!-- 🔥 THEMES -->
   <link rel="stylesheet" href="../writing/styles/themes/sky.css">
   <link rel="stylesheet" href="../writing/styles/themes/moon.css">
   <link rel="stylesheet" href="../writing/styles/themes/romantic.css">
   <link rel="stylesheet" href="../writing/styles/themes/hellokitty.css">
  <link rel="stylesheet" href="../writing/styles/themes/aries.css">
  <link rel="stylesheet" href="../writing/styles/themes/leo.css">
  <link rel="stylesheet" href="../writing/styles/themes/pisces.css">
  <link rel="stylesheet" href="../writing/styles/themes/aquarius.css">
  <link rel="stylesheet" href="../writing/styles/themes/capricorn.css">
  <link rel="stylesheet" href="../writing/styles/themes/sagittarius.css">
  <link rel="stylesheet" href="../writing/styles/themes/scorpio.css">
  <link rel="stylesheet" href="../writing/styles/themes/libra.css">
  <link rel="stylesheet" href="../writing/styles/themes/virgo.css">
  <link rel="stylesheet" href="../writing/styles/themes/cancer.css">
  <link rel="stylesheet" href="../writing/styles/themes/gemini.css">
  <link rel="stylesheet" href="../writing/styles/themes/taurus.css">

  <!-- 🔥 CSS RIÊNG -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <div id="intro">
  <div class="intro-text">VeluneInk❤</div>
</div>

<div id="passwordBox" class="hidden">
  <div class="password-card">
    <h3>🔒</h3>
    <p>
      Có vẻ như lá thư này cần sự thân thiết để truy cập,<br>
      hãy liên hệ với người viết để có được mật mã nhé 👀
    </p>

    <input type="password" id="passwordInput" placeholder="Nhập mật mã...">
    <button onclick="checkPassword()">Mở thư</button>

    <div id="passwordError"></div>
  </div>
</div>

<div class="container reading-container">

  <div id="loading">Đang mở thư...</div>

  <div id="letterBox" class="hidden">

    <div class="letter-header">
      <h2 id="to"></h2>
      <p id="from"></p>
    </div>

    <hr>

    <div id="content" class="letter-content"></div>

    <div class="actions">
      <button onclick="copyLink()">Copy link</button>
    </div>

  </div>

  <div id="error" class="hidden"></div>

</div>

<script type="module" src="./script.js"></script>

</body>
</html>
